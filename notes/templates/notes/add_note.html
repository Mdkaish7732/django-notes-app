{% extends 'notes/base.html' %}

{% block content %}
    <h1 class="my-4">Add a New Note </h1>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.title.label_tag }}
            {{ form.title }}
        </div>
        <div class="mb-3">
            {{ form.content.label_tag }}
            {{ form.content }}
        </div>
        <button class="btn btn-primary" type="submit">Save Note</button>
    </form>
{% endblock %}
